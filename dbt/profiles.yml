my_lakehouse:
  target: local
  outputs:

    # Free local iteration -- reads from Parquet cache in .cache/
    # Run: dbt run --target local
    local:
      type: duckdb
      path: "{{ env_var('LAKEHOUSE_DB_PATH', '/workspaces/your-project/local-devex/.cache/lakehouse_dev.duckdb') }}"
      threads: 4
      schema: silver

    # Databricks SQL warehouse -- run when ready to validate on real data
    # Export DATABRICKS_TOKEN before use:
    #   export DATABRICKS_TOKEN=$(databricks auth token --host $DATABRICKS_HOST)
    # Run: dbt run --target prod
    prod:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: "{{ env_var('DATABRICKS_CATALOG') }}"
      schema: silver
      threads: 4
